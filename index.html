<button id="install-btn" style="display:none;">⬇ Install</button>
<script>
    let deferredPrompt;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById("install-btn").style.display = "block";
    });

    document.getElementById("install-btn").addEventListener("click", () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById("install-btn").style.display = "none";
      });
    });
</script>

            {id:"1.14", snk:"ତତଃ ଶ୍ୱେତୈର୍ହୟୈର୍ୟୁକ୍ତେ ମହତି ସ୍ୟନ୍ଦନେ ସ୍ଥିତୌ ।<br>ମାଧବଃ ପାଣ୍ଡବଶ୍ଚୈବ ଦିବ୍ୟୌ ଶଂଖୌ ପ୍ରଦଧ୍ମତୁଃ ।।୧୪।।",
            odia:"ତାପରେ ଧଳା ଘୋଡ଼ା ଯୁକ୍ତ ମହାରଥରେ ବସିଥିବା ମାଧବ (ଶ୍ରୀକୃଷ୍ଣ) ଓ ପାଣ୍ଡବ (ଅର୍ଜୁନ) ଦିବ୍ୟ ଶଂଖ ବାଜାଇଲେ ।"},

            {id:"1.15", snk:"ପାଞ୍ଚଜନ୍ୟଂ ହୃଷୀକେଶୋ ଦେବଦତ୍ତଂ ଧନଞ୍ଜୟଃ ।<br>ପୌଣ୍ଡ୍ରଂ ଦଧ୍ମୌ ମହାଶଂଖଂ ଭୀମକର୍ମା ବୃକୋଦରଃ ।।୧୫।।",
            odia:"ହୃଷୀକେଶ (ଶ୍ରୀକୃଷ୍ଣ) ପାଞ୍ଚଜନ୍ୟ ଶଂଖ ବାଜାଇଲେ; ଧନଞ୍ଜୟ (ଅର୍ଜୁନ) ଦେବଦତ୍ତ ଓ ଭୀମକର୍ମା ବୃକୋଦର (ଭୀମ) ପୌଣ୍ଡ୍ର ନାମକ ମହାଶଂଖ ବାଜାଇଲେ ।"},

            {id:"1.16", snk:"ଅନନ୍ତବିଜୟଂ ରାଜା କୁନ୍ତୀପୁତ୍ରୋ ଯୁଧିଷ୍ଠିରଃ ।<br>ନକୁଳଃ ସହଦେବଶ୍ଚ ସୁଘୋଷମଣିପୁଷ୍ପକୌ ।।୧୬।।",
            odia:"କୁନ୍ତୀପୁତ୍ର ରାଜା ଯୁଧିଷ୍ଠିର ଅନନ୍ତବିଜୟ ଶଂଖ ବାଜାଇଲେ; ନକୁଳ ଓ ସହଦେବ କ୍ରମେ ସୁଘୋଷ ଓ ମଣିପୁଷ୍ପକ ଶଂଖ ବାଜାଇଲେ ।"},

            {id:"1.17", snk:"କାଶ୍ୟଶ୍ଚ ପରମେଷ୍ୱାସଃ ଶିଖଣ୍ଡୀ ଚ ମହାରଥଃ ।<br>ଧୃଷ୍ଟଦ୍ୟୁମ୍ନୋ ବିରାଟଶ୍ଚ ସାତ୍ୟକିଶ୍ଚାପରାଜିତଃ ।।୧୭।।",
            odia:"ପରମ ଧନୁର୍ଧର କାଶୀରାଜ, ମହାରଥୀ ଶିଖଣ୍ଡୀ, ଧୃଷ୍ଟଦ୍ୟୁମ୍ନ, ବିରାଟ ଓ ଅପରାଜିତ ସାତ୍ୟକି ମଧ୍ୟ ଶଂଖ ବାଜାଇଲେ ।"},

            {id:"1.18", snk:"ଦ୍ରୁପଦୋ ଦ୍ରୌପଦେୟାଶ୍ଚ ସର୍ୱଶଃ ପୃଥିବୀପତେ ।<br>ସୌଭଦ୍ରଶ୍ଚ ମହାବାହୁଃ ଶଂଖାନ୍ ଦଧ୍ମୁଃ ପୃଥକ୍ ପୃଥକ୍ ।।୧୮।।",
            odia:"ହେ ରାଜନ! ଦ୍ରୁପଦ, ଦ୍ରୌପଦୀଙ୍କ ପୁତ୍ରମାନେ ଓ ମହାବାହୁ ସୁଭଦ୍ରାପୁତ୍ର ଅଭିମନ୍ୟୁ ପୃଥକ୍ ପୃଥକ୍ ଶଂଖ ବାଜାଇଲେ ।"},

            {id:"1.19", snk:"ସ ଘୋଷୋ ଧାର୍ତରାଷ୍ଟ୍ରାଣାଂ ହୃଦୟାନି ବ୍ୟଦାରୟତ୍ ।<br>ନଭଶ୍ଚ ପୃଥିବୀଂ ଚୈବ ତୁମୁଲୋ ଅଭ୍ୟନୁନାଦୟନ୍ ।।୧୯।।",
            odia:"ସେହି ଭୟଙ୍କର ଧ୍ୱନି ଧୃତରାଷ୍ଟ୍ରଙ୍କ ପୁତ୍ରମାନଙ୍କ ହୃଦୟକୁ କମ୍ପିତ କରିଦେଲା ଓ ଆକାଶ ଓ ପୃଥିବୀକୁ ମଧ୍ୟ ପ୍ରତିଧ୍ୱନିତ କଲା ।"},

            {id:"1.20", snk:"ଅଥ ବ୍ୟବସ୍ଥିତାନ୍ ଦୃଷ୍ଟ୍ୱା ଧାର୍ତରାଷ୍ଟ୍ରାନ୍ କପିଧ୍ୱଜଃ ।<br>ପ୍ରବୃତ୍ତେ ଶସ୍ତ୍ରସମ୍ପାତେ ଧନୁରୁଦ୍ୟମ୍ୟ ପାଣ୍ଡବଃ ।।୨୦।।",
            odia:"ତାପରେ କପିଧ୍ୱଜ ପାଣ୍ଡବ (ଅର୍ଜୁନ) ଧୃତରାଷ୍ଟ୍ରଙ୍କ ପୁତ୍ରମାନଙ୍କୁ ଯୁଦ୍ଧ ପାଇଁ ସଜ୍ଜ ଦେଖି ଧନୁଷ ଉଠାଇଲେ ।"},

            {id:"1.21", snk:"ହୃଷୀକେଶଂ ତଦା ବାକ୍ୟମିଦମାହ ମହୀପତେ ।<br>ସେନୟୋରୁଭୟୋର୍ମଧ୍ୟେ ରଥଂ ସ୍ଥାପୟ ମେऽଚ୍ୟୁତ ।।୨୧।।",
            odia:"ତାପରେ ସେ ହୃଷୀକେଶ (ଶ୍ରୀକୃଷ୍ଣ)ଙ୍କୁ କହିଲେ: ହେ ଅଚ୍ୟୁତ! ମୋର ରଥକୁ ଉଭୟ ସେନାର ମଧ୍ୟରେ ରଖନ୍ତୁ ।"},

            {id:"1.22", snk:"ୟାବଦେତାନ୍ ନିରୀକ୍ଷେऽହଂ ଯୋଦ୍ଧୁକାମାନବସ୍ଥିତାନ୍ ।<br>କୈର୍ମୟା ସହ ଯୋଦ୍ଧବ୍ୟମସ୍ମିନ୍ ରଣସମୁଦ୍ୟମେ ।।୨୨।।",
            odia:"ମୁଁ ଏହି ଯୁଦ୍ଧକୁ ଇଚ୍ଛା କରୁଥିବା ଯୋଧାମାନଙ୍କୁ ଦେଖିବି, କାହା ସହିତ ଏହି ଯୁଦ୍ଧରେ ମୋତେ ଯୁଦ୍ଧ କରିବାକୁ ପଡ଼ିବ ।"},
            {id:"1.23", snk:"ଯୋତ୍ସ୍ୟମାନାନବେକ୍ଷେऽହଂ ଯ ଏତେऽତ୍ର ସମାଗତାଃ ।<br>ଧାର୍ତରାଷ୍ଟ୍ରସ୍ୟ ଦୁର୍ବୁଦ୍ଧେର୍ଯୁଦ୍ଧେ ପ୍ରିୟଚିକୀର୍ଷବଃ ।।୨୩।।",
            odia:"ଏଠାରେ ଯେମାନେ ଧୃତରାଷ୍ଟ୍ରଙ୍କ ଦୁର୍ବୁଦ୍ଧି ପୁତ୍ରଙ୍କ ପ୍ରିୟ କାମନା ପୂରଣ ପାଇଁ ଯୁଦ୍ଧକୁ ଆସିଛନ୍ତି, ସେମାନଙ୍କୁ ମୁଁ ଦେଖିବାକୁ ଚାହେଁ ।"},

            {id:"1.24", snk:"ସଞ୍ଜୟ ଉବାଚ<br>ଏବମୁକ୍ତୋ ହୃଷୀକେଶୋ ଗୁଡାକେଶେନ ଭାରତ ।<br>ସେନୟୋରୁଭୟୋର୍ମଧ୍ୟେ ସ୍ଥାପୟିତ୍ୱା ରଥୋତ୍ତମମ୍ ।।୨୪।।",
            odia:"ସଞ୍ଜୟ କହିଲେ: ହେ ଭାରତ! ଗୁଡାକେଶ (ଅର୍ଜୁନ)ଙ୍କ ଏହି କଥାରେ ହୃଷୀକେଶ (ଶ୍ରୀକୃଷ୍ଣ) ଉଭୟ ସେନାର ମଧ୍ୟରେ ଉତ୍ତମ ରଥକୁ ରଖିଲେ ।"},

            {id:"1.25", snk:"ଭୀଷ୍ମଦ୍ରୋଣପ୍ରମୁଖତଃ ସର୍ୱେଷାଂ ଚ ମହୀକ୍ଷିତାମ୍ ।<br>ଉବାଚ ପାର୍ଥ ପଶ୍ୟୈତାନ୍ ସମବେତାନ୍ କୁରୂନିତି ।।୨୫।।",
            odia:"ଭୀଷ୍ମ, ଦ୍ରୋଣ ଓ ଅନ୍ୟାନ୍ୟ ରାଜମାନଙ୍କ ସମ୍ମୁଖରେ ରଥକୁ ରଖି, ଶ୍ରୀକୃଷ୍ଣ କହିଲେ: ହେ ପାର୍ଥ! ଏହି ସମବେତ କୁରୁମାନଙ୍କୁ ଦେଖ ।"},

            {id:"1.26", snk:"ତତ୍ରାପଶ୍ୟତ୍ ସ୍ଥିତାନ୍ ପାର୍ଥଃ ପିତୄନଥ ପିତାମହାନ୍ ।<br>ଆଚାର୍ଯ୍ୟାନ୍ ମାତୁଲାନ୍ ଭ୍ରାତୄନ୍ ପୁତ୍ରାନ୍ ପୌତ୍ରାନ୍ ସଖୀଂସ୍ତଥା ।।୨୬।।",
            odia:"ଅର୍ଜୁନ ସେଠାରେ ନିଜ ପିତା, ପିତାମହ, ଗୁରୁ, ମାମା, ଭାଇ, ପୁତ୍ର, ପୌତ୍ର ଓ ସଖାମାନଙ୍କୁ ଦେଖିଲେ ।"},

            {id:"1.27", snk:"ଶ୍ୱଶୁରାନ୍ ସୁହୃଦଶ୍ଚୈବ ସେନୟୋରୁଭୟୋରପି ।<br>ତାନ୍ ସମୀକ୍ଷ୍ୟ ସ କୌନ୍ତେୟଃ ସର୍ୱାନ୍ ବନ୍ଧୂନବସ୍ଥିତାନ୍ ।।୨୭।।",
            odia:"ଉଭୟ ସେନାରେ ନିଜ ଶ୍ୱଶୁର ଓ ସୁହୃଦମାନଙ୍କୁ ଦେଖି, କୌନ୍ତେୟ (ଅର୍ଜୁନ) ସମସ୍ତ ବନ୍ଧୁମାନଙ୍କୁ ସ୍ଥିତ ଦେଖିଲେ ।"},

            {id:"1.28", snk:"କୃପୟା ପରୟାବିଷ୍ଟୋ ବିଷୀଦନ୍ନିଦମବ୍ରବୀତ୍ ।<br>ଦୃଷ୍ଟ୍ୱେମଂ ସ୍ୱଜନଂ କୃଷ୍ଣ ୟୁୟୁତ୍ସୁଂ ସମୁପସ୍ଥିତମ୍ ।।୨୮।।",
            odia:"ଅତ୍ୟନ୍ତ କୃପାଭାବରେ ଆବେଗପୂର୍ଣ୍ଣ ହୋଇ ଅର୍ଜୁନ କହିଲେ: ହେ କୃଷ୍ଣ! ଏହି ସ୍ୱଜନମାନେ ଯୁଦ୍ଧ ପାଇଁ ସଜ୍ଜ ଦେଖି ମୋର ହୃଦୟ ବିଷାଦରେ ପୂର୍ଣ୍ଣ ।"},

            {id:"1.29", snk:"ସୀଦନ୍ତି ମମ ଗାତ୍ରାଣି ମୁଖଂ ଚ ପରିଶୁଷ୍ୟତି ।<br>ବେପଥୁଶ୍ଚ ଶରୀରେ ମେ ରୋମହର୍ଷଶ୍ଚ ଜାୟତେ ।।୨୯।।",
            odia:"ମୋର ଅଙ୍ଗପ୍ରତ୍ୟଙ୍ଗ କମ୍ପିତ ହେଉଛି, ମୁଖ ଶୁଖିଯାଉଛି, ଶରୀର କମ୍ପିତ ଓ ଲୋମହର୍ଷ ହେଉଛି ।"},

            {id:"1.30", snk:"ଗାଣ୍ଡୀବଂ ସ୍ରଂସତେ ହସ୍ତାତ୍ ତ୍ୱକ୍ଚୈବ ପରିଦହ୍ୟତେ ।<br>ନ ଚ ଶକ୍ନୋମ୍ୟବସ୍ଥାତୁଂ ଭ୍ରମତୀୱ ଚ ମେ ମନଃ ।।୩୦।।",
            odia:"ମୋର ହାତରୁ ଗାଣ୍ଡୀବ ଖସିଯାଉଛି, ଚର୍ମ ଜ୍ୱଳନ ହେଉଛି, ଠିଆ ରହିପାରୁନାହିଁ, ମନ ଭ୍ରମିତ ହେଉଛି ।"},

            {id:"1.31", snk:"ନିମିତ୍ତାନି ଚ ପଶ୍ୟାମି ବିପରୀତାନି କେଶବ ।<br>ନ ଚ ଶ୍ରେଯୋऽନୁପଶ୍ୟାମି ହତ୍ୱା ସ୍ୱଜନମାହବେ ।।୩୧।।",
            odia:"ହେ କେଶବ! ମୁଁ ଅଶୁଭ ଲକ୍ଷଣ ଦେଖୁଛି ଓ ସ୍ୱଜନଙ୍କୁ ହତ୍ୟା କରି କୌଣସି ମଙ୍ଗଳ ଦେଖୁନାହିଁ ।"},

            {id:"1.32", snk:"ନ କାଙ୍କ୍ଷେ ବିଜୟଂ କୃଷ୍ଣ ନ ଚ ରାଜ୍ୟଂ ସୁଖାନି ଚ ।<br>କିଂ ନୋ ରାଜ୍ୟେନ ଗୋବିନ୍ଦ କିଂ ଭୋଗୈର୍ଜୀବିତେନ ବା ।।୩୨।।",
            odia:"ହେ କୃଷ୍ଣ! ମୁଁ ବିଜୟ, ରାଜ୍ୟ କିମ୍ବା ସୁଖ କାମନା କରୁନାହିଁ। ହେ ଗୋବିନ୍ଦ! ରାଜ୍ୟ, ଭୋଗ କିମ୍ବା ଜୀବନର ଆମ ପାଇଁ କ’ଣ ମୂଲ୍ୟ?"},

            {id:"1.33", snk:"ଯେଷାମର୍ଥେ କାଙ୍କ୍ଷିତଂ ନୋ ରାଜ୍ୟଂ ଭୋଗାଃ ସୁଖାନି ଚ ।<br>ତ ଇମେऽବସ୍ଥିତା ଯୁଦ୍ଧେ ପ୍ରାଣାଂସ୍ତ୍ୟକ୍ତ୍ୱା ଧନାନି ଚ ।।୩୩।।",

    let bookmarks = JSON.parse(localStorage.getItem('gita_bookmarks')) || [];
    let isMuted = localStorage.getItem('isMuted') === 'true';

    function init() {
        renderChapters();
        updateMuteUI();
    }

    function renderChapters() {
        const list = document.getElementById('chapter-list');
        list.innerHTML = '';
        gitaData.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'chapter-card';
            div.innerHTML = `
                <div class="chapter-info">
                    <h3>ଅଧ୍ୟାୟ ${ch.id}</h3>
                    <p>${ch.title}</p>
                </div>
                <div class="sloka-count-tag">${ch.count} ଶ୍ଳୋକ</div>
            `;
            div.onclick = () => openChapter(ch);
            list.appendChild(div);
        });
    }

    function openChapter(ch) {
        if(ch.slokas.length === 0) { alert("ଶ୍ଳୋକ ତଥ୍ୟ ଶୀଘ୍ର ଆସୁଛି!"); return; }
        switchTab('detail');
        document.getElementById('header-title').innerText = ch.title;
        document.getElementById('back-btn').style.display = 'block';
        const list = document.getElementById('sloka-list');
        list.innerHTML = '';
        ch.slokas.forEach(s => list.appendChild(createSlokaElement(s, ch.title)));
        window.scrollTo(0,0);
    }

        <path d="M16.04 2.003C8.83 2.003 2.99 7.844 2.99 15.054c0 2.66.78 5.14 2.13 7.22L2 30l7.95-2.08c2.01 1.1 4.3 1.72 6.59 1.72 7.21 0 13.05-5.84 13.05-13.05 0-7.21-5.84-13.05-13.05-13.05zm0 23.94c-2.11 0-4.16-.57-5.95-1.65l-.42-.25-4.72 1.23 1.26-4.6-.27-.44c-1.16-1.86-1.77-4-1.77-6.17 0-6.6 5.37-11.97 11.97-11.97s11.97 5.37 11.97 11.97-5.37 11.97-11.97 11.97zm6.56-8.89c-.36-.18-2.13-1.05-2.46-1.17-.33-.12-.57-.18-.81.18-.24.36-.93 1.17-1.14 1.41-.21.24-.42.27-.78.09-.36-.18-1.52-.56-2.89-1.78-1.07-.95-1.8-2.12-2.01-2.48-.21-.36-.02-.55.16-.73.16-.16.36-.42.54-.63.18-.21.24-.36.36-.6.12-.24.06-.45-.03-.63-.09-.18-.81-1.95-1.11-2.67-.29-.7-.59-.61-.81-.62l-.69-.01c-.24 0-.63.09-.96.45-.33.36-1.26 1.23-1.26 3 0 1.77 1.29 3.48 1.47 3.72.18.24 2.54 3.87 6.16 5.43.86.37 1.53.59 2.05.75.86.27 1.64.23 2.26.14.69-.1 2.13-.87 2.43-1.71.3-.84.3-1.56.21-1.71-.09-.15-.33-.24-.69-.42z"/>
    </svg>
</span>
                <span class="icon-btn bookmark-icon ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark('${s.id}', this)">❤</span>
            </div>
            <small>ଶ୍ଳୋକ ${s.id}</small>
            <span class="sanskrit">${s.snk.replace(/\n/g, '<br>')}</span>
            <span class="odia-meaning">${s.odia}</span>
        `;
        return div;
    }

    function shareWhatsApp(id, snk, odia, chTitle) {
        const appLink = "https://sandeepwebsite.github.io/odia-bhagavad-gita/"; // 🔁 CHANGE THIS TO YOUR REAL URL

        const text = `📖 *ଶ୍ରୀମଦ୍ଭଗବଦ୍‌ଗୀତା*

        _${chTitle}_

        *ଶ୍ଳୋକ ${id}*
        ${snk.replace(/<br>/g, '\n')}

        *ଅର୍ଥ:*
        ${odia}

        🌐 ପୁରା ପଢନ୍ତୁ:
        ${appLink}

        🙏 ଜୟ ଶ୍ରୀକୃଷ୍ଣ`;

            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function toggleBookmark(id, el) {
        if (bookmarks.includes(id)) {
            bookmarks = bookmarks.filter(b => b !== id);
            el.classList.remove('active');
        } else {
            bookmarks.push(id);
            el.classList.add('active');
        }
        localStorage.setItem('gita_bookmarks', JSON.stringify(bookmarks));
    }

    function switchTab(tab) {
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('bookmark-view').classList.add('hidden');
        document.getElementById('detail-view').classList.add('hidden');
        document.getElementById('tab-home').classList.remove('active');
        document.getElementById('tab-book').classList.remove('active');
        document.getElementById('back-btn').style.display = 'none';

        if(tab === 'home') {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('tab-home').classList.add('active');
            document.getElementById('header-title').innerText = "ଶ୍ରୀମଦ୍ଭଗବଦ୍‌ଗୀତା";
        } else if(tab === 'bookmark') {
            document.getElementById('bookmark-view').classList.remove('hidden');
            document.getElementById('tab-book').classList.add('active');
            renderBookmarks();
        } else {
            document.getElementById('detail-view').classList.remove('hidden');
        }
    }

    function renderBookmarks() {
        const container = document.getElementById('bookmark-list');
        container.innerHTML = '';
        if (bookmarks.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding-top:40px; opacity:0.6;">କୌଣସି ପସନ୍ଦିତ ଶ୍ଳୋକ ମିଳିଲା ନାହିଁ ।</p>';
            return;
        }
        bookmarks.forEach(bid => {
            gitaData.forEach(ch => {
                const found = ch.slokas.find(s => s.id === bid);
                if(found) container.appendChild(createSlokaElement(found, ch.title));
            });
        });
    }


    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(reg => console.log("✅ Service Worker Registered"))
          .catch(err => console.log("❌ SW Error:", err));
      });
    }

    function goHome() { switchTab('home'); }
    function toggleMute() { isMuted = !isMuted; localStorage.setItem('isMuted', isMuted); updateMuteUI(); }
    function updateMuteUI() { document.getElementById('mute-toggle').innerText = isMuted ? "🔇" : "🔊"; }

    init();
</script>
</body>
</html>
